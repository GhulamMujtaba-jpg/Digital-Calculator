<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>GM Online Store</title>
<style>
body {
    font-family: Arial;
    margin: 0;
    padding: 0;
    background: #f5f5f5;
}
header {
    background: #2c3e50;
    color: white;
    padding: 15px;
    text-align: center;
}
header h1 {
    margin: 0;
}
.container {
    padding: 15px;
}
#addProductForm input, #addProductForm button {
    padding: 8px;
    margin: 5px 0;
}
.products {
    display: flex;
    flex-wrap: wrap;
    gap: 15px;
    margin-top: 20px;
}
.product-card {
    background: white;
    padding: 10px;
    border-radius: 10px;
    width: 200px;
    box-shadow: 0 2px 6px rgba(0,0,0,0.2);
    text-align: center;
}
.product-card img {
    width: 100%;
    height: 150px;
    object-fit: cover;
    border-radius: 5px;
}
.price {
    font-weight: bold;
    color: green;
}
.discount {
    color: red;
    font-weight: bold;
}
button.orderBtn {
    background: #25D366;
    color: white;
    border: none;
    padding: 8px 12px;
    cursor: pointer;
    border-radius: 5px;
    margin-top: 5px;
}
input[type="file"] {
    padding: 3px;
}
</style>
</head>
<body>

<header>
<h1>GM Online Store</h1>
</header>

<div class="container">

<h2>Add Product (Admin Only)</h2>
<form id="addProductForm">
    <input type="text" id="pName" placeholder="Product Name" required><br>
    <input type="number" id="pPrice" placeholder="Price" required><br>
    <input type="number" id="pDiscount" placeholder="Discount %" value="0"><br>
    <input type="text" id="pWhatsApp" placeholder="Your WhatsApp Number" required><br>
    <input type="file" id="pImage" accept="image/*" required><br>
    <button type="submit">Add Product</button>
</form>

<hr>

<h2>Products</h2>
<input type="text" id="searchBox" placeholder="Search Products..." onkeyup="searchProducts()">
<div class="products" id="productList"></div>

</div>

<script>
let products = JSON.parse(localStorage.getItem("products")) || [];

function saveProducts() {
    localStorage.setItem("products", JSON.stringify(products));
}

// ===== Add Product =====
document.getElementById("addProductForm").addEventListener("submit", function(e){
    e.preventDefault();
    let name = document.getElementById("pName").value;
    let price = parseFloat(document.getElementById("pPrice").value);
    let discount = parseFloat(document.getElementById("pDiscount").value) || 0;
    let whatsapp = document.getElementById("pWhatsApp").value;
    let imgFile = document.getElementById("pImage").files[0];

    if(!imgFile) return alert("Select image!");

    let reader = new FileReader();
    reader.onload = function(){
        let imgData = reader.result;
        products.push({name, price, discount, whatsapp, imgData});
        saveProducts();
        renderProducts();
        document.getElementById("addProductForm").reset();
    };
    reader.readAsDataURL(imgFile);
});

// ===== Render Products =====
function renderProducts(){
    let list = document.getElementById("productList");
    list.innerHTML = "";
    products.forEach((p,index)=>{
        let card = document.createElement("div");
        card.className = "product-card";
        card.innerHTML = `
            <img src="${p.imgData}" alt="${p.name}">
            <h3>${p.name}</h3>
            <p class="price">₹${p.price}</p>
            ${p.discount>0? `<p class="discount">${p.discount}% OFF</p>` : ""}
            <button class="orderBtn" onclick="orderWhatsApp(${index})">Order via WhatsApp</button>
        `;
        list.appendChild(card);
    });
}

// ===== Search Products =====
function searchProducts(){
    let value = document.getElementById("searchBox").value.toLowerCase();
    let filtered = products.filter(p=>p.name.toLowerCase().includes(value));
    let list = document.getElementById("productList");
    list.innerHTML = "";
    filtered.forEach((p,index)=>{
        let card = document.createElement("div");
        card.className = "product-card";
        card.innerHTML = `
            <img src="${p.imgData}" alt="${p.name}">
            <h3>${p.name}</h3>
            <p class="price">₹${p.price}</p>
            ${p.discount>0? `<p class="discount">${p.discount}% OFF</p>` : ""}
            <button class="orderBtn" onclick="orderWhatsApp(${index})">Order via WhatsApp</button>
        `;
        list.appendChild(card);
    });
}

// ===== WhatsApp Order =====
function orderWhatsApp(index){
    let p = products[index];
    let msg = `Hello! I want to order "${p.name}" priced ₹${p.price}.`;
    let url = `https://wa.me/${p.whatsapp}?text=${encodeURIComponent(msg)}`;
    window.open(url, "_blank");
}

// Initial render
renderProducts();
</script>

</body>
</html>
